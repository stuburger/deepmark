name: Cleanup Preview Environment

on:
  pull_request:
    types: [closed]

permissions:
  id-token: write
  contents: read

jobs:
  generate-stage-name:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.stage.outputs.stage }}
    steps:
      - uses: rlespinasse/github-slug-action@v5
        with:
          slug-maxlength: 36

      - name: Generate stage name
        id: stage
        run: echo "stage=pr-${{ github.event.pull_request.number }}-${{ env.GITHUB_HEAD_REF_SLUG }}" >> $GITHUB_OUTPUT

  cleanup:
    name: Cleanup Stage "${{ needs.generate-stage-name.outputs.stage }}"
    runs-on: ubuntu-latest
    needs: generate-stage-name
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          role-duration-seconds: 3600
          aws-region: eu-west-2

      - name: Fix Pulumi version conflict
        run: sudo rm -f /usr/local/bin/pulumi-language-nodejs

      # sst remove handles the Neon branch teardown too (via the neon Pulumi
      # provider that owns the branch in state).
      - name: Remove SST stage
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          StripeSecretKey: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
        run: bunx sst remove --stage=${{ needs.generate-stage-name.outputs.stage }}
