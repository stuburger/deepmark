name: Deploy to Development and Production

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun db:generate

      - name: Typecheck
        run: bun typecheck

      - name: Lint (Biome + tokens)
        # Temporarily non-blocking — there's pre-existing debt (renamed
        # biome rules in suppressions, residual `any` casts) we'll work
        # off in a separate pass. Flip back to a hard fail once it's
        # green.
        continue-on-error: true
        run: bun check

  deploy-dev:
    needs: [typecheck]
    uses: ./.github/workflows/deploy-stage.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: development
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}

  deploy-prod:
    needs: [deploy-dev]
    uses: ./.github/workflows/deploy-stage.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: production
    secrets:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_LIVE }}
