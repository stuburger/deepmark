  .db-header {

  .ml-arc { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; border-top-color: #6B4FA0; border-right-color: rgba(107,79,160,0.35); position: absolute; inset: 0; animation: spin 1.1s linear infinite; }
  .ml-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: dotColour 3s ease-in-out infinite; }
  .ml-particle { width: 2.5px; height: 2.5px; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform-origin: 0 0; animation: orbit 1.6s linear infinite; }

  .ml-particle:nth-child(4) { animation-delay: -1.07s; opacity: 0.35; }

  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes orbit { from{transform:translate(-50%,-50%) rotate(0deg) translateX(8px)} to{transform:translate(-50%,-50%) rotate(360deg) translateX(8px)} }

    0%,100% { background: #6B4FA0; box-shadow: 0 0 4px rgba(107,79,160,0.6); }
    33% { background: #9B79D4; box-shadow: 0 0 4px rgba(155,121,212,0.7); }

  .q-item.waiting { opacity: 0.38; }

  .metric-card { background: var(--color-background-secondary); border: 1px solid rgba(107,79,160,0.15); border-radius: 8px; padding: 9px 12px; }

var feedEl = document.getElementById('feed');
var currentLineIdx = 0;

function revealLine(lineData, callback) {
  var div = document.createElement('div');
  div.className = 'feed-line ' + lineData.c;
  feedEl.appendChild(div);

  // Always scroll to show newest at bottom
  feedEl.scrollTop = feedEl.scrollHeight;

  var words = lineData.t.split(' ');
  var wordEls = [];

  words.forEach(function(w, i) {
    var span = document.createElement('span');
    span.className = 'feed-word';
    span.textContent = w + (i < words.length - 1 ? ' ' : '');
    div.appendChild(span);
    wordEls.push(span);
  });

  div.classList.add('revealed');

  var wordDelay = 38;
  wordEls.forEach(function(span, i) {
    setTimeout(function() {
      span.classList.add('shown');
      feedEl.scrollTop = feedEl.scrollHeight;
    }, i * wordDelay);
  });

  var totalTime = wordEls.length * wordDelay + 80;
  setTimeout(callback, totalTime);
}

function nextLine() {
  if (currentLineIdx >= feedLines.length) return;
  var line = feedLines[currentLineIdx];
  currentLineIdx++;
  revealLine(line, function() {
    var pause = line.c === 'fc-head' ? 280 : 70;
    setTimeout(nextLine, pause);
  });
  decisionsCount += Math.floor(Math.random() * 3 + 1);
  document.getElementById('metricDecisions').textContent = decisionsCount;
}

setTimeout(nextLine, 500);

function buildQueue() {
  var q = document.getElementById('queue');

    var item = document.createElement('div');
    item.id = 'qi-' + i;
    var state = i < currentStudent ? 'done' : i === currentStudent ? 'active' : 'waiting';

    var score = studentDone[i] ? (28 + Math.floor(i*0.6) + Math.floor(Math.random()*5)) + '/43' : '';
    item.innerHTML =
      '<div class="q-row"><div class="q-name">' + name + '</div>' + (studentDone[i] ? '<div class="q-score">' + score + '</div>' : '') + '</div>' +
      '<div class="q-status ' + (i < currentStudent ? 'done2' : i === currentStudent ? 'marking' : 'waiting2') + '">' +
        '<div class="q-sdot"></div>' + (i < currentStudent ? 'Complete' : i === currentStudent ? 'Marking…' : 'Waiting') +
      '</div>' +
      '<div class="q-bar-wrap"><div class="q-bar" id="qbar-'+i+'" style="width:' + (studentDone[i]?100:i===currentStudent?studentProgress[i]:0) + '%"></div></div>';
    q.appendChild(item);
  });
}

buildQueue();

setInterval(function() {
  if (currentStudent >= students.length) return;
  studentProgress[currentStudent] = Math.min(100, studentProgress[currentStudent] + Math.random()*6+3);
  var bar = document.getElementById('qbar-' + currentStudent);
  if (bar) bar.style.width = studentProgress[currentStudent] + '%';
  if (studentProgress[currentStudent] >= 100) {
    studentDone[currentStudent] = true;
    doneCount++;
    document.getElementById('metricDone').innerHTML = doneCount + '<span class="metric-denom">/24</span>';
    currentStudent++;
    buildQueue();
  }
}, 900);

setInterval(function() {
  if (secondsRemaining > 0) secondsRemaining--;
  var m = Math.floor(secondsRemaining/60);
  var s = secondsRemaining%60;
  document.getElementById('metricTime').textContent = m + 'm ' + (s<10?'0':'') + s + 's';
}, 1000);
</script>
